<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Formulário</title>
  <link rel="stylesheet" href="styles/ForSit.css">
</head>
<body>
  <header>
    <h1>
    Sociedade projectista e artística
    </h1>
  </header>
  <main>
<p><strong>
      Precisas de uma conta para acessares o nosso site,
      Preencha os campos abaixo para criar sua conta
    </strong></p>
    <form action="index.html" method="post">
    <div>
      <p>
         <label for="nome">Nome</label><input type="text" id="nome" name="nome" required="" placeholder="Digite aqui o seu nome">
      </p> 
      <p>
        <label for="senha">Senha</label><input type="password" id="senha" name="senha" required="" placeholder="Digite aqui a sua senha">
      </p> 
      <p>
        <label for="telf">Telefone</label><input type="tel" id="telf" name="telf" required="" placeholder="número de Telefone">
      </p>  
      <p>
              <label for="em">E-mail</label><input type="email" id="em" name="em" required="" placeholder="Digite aqui o seu E-mail">
      </p>
      
        <p><input type="submit" value="Criar conta" id="bts"></p>
              <p><input type="button" value="Esqueci minha senha" id="btc"onclick='alerta()'></p>
      </div>
      
  </form>
  </main>  
  <script>
  function alerta(){
    alert('página não disponível')
  }
  </script>
</body>
</html>
